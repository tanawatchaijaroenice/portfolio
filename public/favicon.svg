<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Define the neon gradient -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Define the subtle border gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1" />
    </linearGradient>

    <!-- Define the glow filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card -->
  <rect x="24" y="24" width="464" height="464" rx="120" fill="#070b13" stroke="url(#border-grad)" stroke-width="6" />

  <!-- Inner glowing glow behind the symbol -->
  <circle cx="256" cy="256" r="140" fill="#8b5cf6" opacity="0.08" filter="blur(30px)" />
  <circle cx="256" cy="256" r="100" fill="#00f5ff" opacity="0.08" filter="blur(20px)" />

  <!-- Code elements with glow -->
  <g filter="url(#neon-glow)">
    <!-- Left Bracket < -->
    <path d="M 150 160 L 90 256 L 150 352" 
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Right Bracket > -->
    <path d="M 362 160 L 422 256 L 362 352" 
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="36" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- Center T (for Tanawat) -->
    <!-- Horizontal Bar -->
    <path d="M 210 190 H 302" 
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="36" 
          stroke-linecap="round" />
          
    <!-- Stem -->
    <path d="M 256 190 V 322" 
          fill="none" 
          stroke="url(#neon-grad)" 
          stroke-width="36" 
          stroke-linecap="round" />
  </g>
</svg>
